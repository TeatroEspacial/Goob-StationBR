- type: entity
  parent: BaseAction
  id: ActionMorphReplicate
  name: Replicate
  description: Copies your cells to create a replica of yourself. Costs 150 biomass.
  components:
  - type: Action
    icon:
      sprite: _Goobstation/Mobs/morph.rsi
      state: morph
  - type: InstantAction
    event: !type:MorphReplicateActionEvent

- type: entity
  parent: BaseAction
  id: ActionMorph
  name: Morph
  description: Warps your body to mimic the appearance of almost anything.
  components:
  - type: Action
    itemIconStyle: BigAction
    icon:
      sprite: _Goobstation/Mobs/morph.rsi
      state: morph
  - type: TargetAction
    interactOnMiss: false
  - type: EntityTargetAction
    whitelist:
      components:
      - Anchorable
      - Item
    interactOnMiss: false
    event: !type:MorphActionEvent

- type: entity
  parent: BaseAction
  id: ActionUnMorph
  name: Un-Morph
  description: Tries to revert you to your original form if you are morphed.
  components:
  - type: Action
    icon:
      sprite: Objects/Devices/chameleon_projector.rsi
      state: morph
  - type: InstantAction
    event: !type:UnMorphActionEvent

- type: entity
  parent: BaseAction
  id: ActionMorphDevour
  name: "[color=red]Devour[/color]"
  description: Attempt to eat an item or creature, increasing your biomass.
  components:
  - type: Action
    icon: { sprite : Interface/Actions/devour.rsi, state: morph }
    iconOn: { sprite : Interface/Actions/devour.rsi, state: morph-on }
    itemIconStyle: BigAction
    priority: 1
  - type: TargetAction
  - type: EntityTargetAction
    canTargetSelf: false
    whitelist:
      components:
      - MobState
      - Item
    event: !type:DevourActionEvent
